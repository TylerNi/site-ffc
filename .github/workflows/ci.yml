name: CI

# Vérifications sur PR (et sur main pour alimenter le statut / le cache).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Typecheck · Tests · Build
    runs-on: ubuntu-latest
    # Postgres de service pour les tests d'intégration de l'API (tâche 04) :
    # le globalSetup vitest rejoue les migrations sur ffc_test puis seed.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ffc
          POSTGRES_PASSWORD: ffc
          POSTGRES_DB: ffc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ffc -d ffc_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ffc:ffc@localhost:5432/ffc_test?schema=public
      TEST_DATABASE_URL: postgresql://ffc:ffc@localhost:5432/ffc_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Échoue si une vulnérabilité de sévérité « high » ou « critical » touche
      # les dépendances de production.
      - name: pnpm audit (prod, seuil high)
        run: pnpm audit --prod --audit-level=high

  docker:
    name: Build image API (sans push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (validation du Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
